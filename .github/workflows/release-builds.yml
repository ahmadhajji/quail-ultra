name: Release Builds

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-mac:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build macOS Apple Silicon bundle
        run: npm run build:mac-arm64-manual

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: quail-ultra-macos-arm64
          path: dist/Quail Ultra-*.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 16
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Generate icon assets
        run: python scripts/prepare_quail_ultra_icon.py

      - name: Build Windows zip
        run: npm run build:win-x64

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: quail-ultra-windows-x64
          path: dist/Quail Ultra-*.zip
